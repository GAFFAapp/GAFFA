<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خاشع - Khashi'</title>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            border: 2px solid #238636;
            display: inline-block;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px #238636;
        }
        .prayer-card {
            margin: 10px;
            padding: 10px;
            background: #161b22;
            border-radius: 8px;
        }
        .next-prayer { color: #f0883e; font-weight: bold; font-size: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>تطبيق خاشع 🕋</h1>
        <p>التاريخ: {{ prayer_data.date }}</p>
        
        <div class="next-prayer">
            الصلاة القادمة: {{ next_prayer.name }} عند {{ next_prayer.time }}
        </div>

        <div id="prayers">
            {% for name, time in prayer_data.timings.items() %}
                {% if name in ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'] %}
                <div class="prayer-card">{{ name }}: {{ time }}</div>
                {% endif %}
            {% endfor %}
        </div>
    </div>
</body>
</html>
