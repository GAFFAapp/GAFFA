<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pong - لعبة بونغ الحديثة</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a0a; /* خلفية داكنة جداً لإبراز النيون */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: #111;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4); /* تأثير التوهج الحديث */
            border-radius: 10px;
            border: 2px solid #0ff;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    // إعداد الـ Canvas للرسم ثنائي الأبعاد
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // كائن الكرة مع خصائص الفيزياء المبسطة
    const ball = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 10,
        velocityX: 5,
        velocityY: 5,
        speed: 7,
        color: "#0ff" // لون سماوي نيون
    };

    // كائن مضرب اللاعب
    const user = {
        x: 0,
        y: (canvas.height - 100) / 2,
        width: 10,
        height: 100,
        color: "#0ff"
    };

    // كائن مضرب الذكاء الاصطناعي (الكمبيوتر)
    const com = {
        x: canvas.width - 10,
        y: (canvas.height - 100) / 2,
        width: 10,
        height: 100,
        color: "#f0f" // لون وردي نيون
    };

    // دالة حديثة لرسم المستطيلات (المضارب) مع تأثير التوهج (Glow)
    const drawRect = (x, y, w, h, color) => {
        ctx.fillStyle = color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = color;
        ctx.fillRect(x, y, w, h);
        ctx.shadowBlur = 0; // إعادة التعيين حتى لا يتوهج كل شيء
    };

    // دالة رسم الدائرة (الكرة)
    const drawArc = (x, y, r, color) => {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2, true);
        ctx.closePath();
        ctx.shadowBlur = 20;
        ctx.shadowColor = color;
        ctx.fill();
        ctx.shadowBlur = 0;
    };

    // التحكم في مضرب اللاعب عن طريق حركة الماوس
    canvas.addEventListener("mousemove", (evt) => {
        let rect = canvas.getBoundingClientRect();
        user.y = evt.clientY - rect.top - user.height / 2;
    });

    // خوارزمية كشف التصادم الدقيقة
    const collision = (b, p) => {
        p.top = p.y;
        p.bottom = p.y + p.height;
        p.left = p.x;
        p.right = p.x + p.width;

        b.top = b.y - b.radius;
        b.bottom = b.y + b.radius;
        b.left = b.x - b.radius;
        b.right = b.x + b.radius;

        return p.left < b.right && p.top < b.bottom && p.right > b.left && p.bottom > b.top;
    };

    // تحديث منطق وفيزياء اللعبة
    const update = () => {
        // تحديث إحداثيات الكرة بناءً على السرعة
        ball.x += ball.velocityX;
        ball.y += ball.velocityY;

        // حركة الذكاء الاصطناعي (رياضيات بسيطة لتتبع الكرة بسلاسة)
        com.y += ((ball.y - (com.y + com.height / 2))) * 0.1;

        // ارتداد الكرة من الجدران العلوية والسفلية
        if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
            ball.velocityY = -ball.velocityY;
        }

        // تحديد من يضرب الكرة (اللاعب أم الكمبيوتر)
        let player = (ball.x + ball.radius < canvas.width / 2) ? user : com;

        // تغيير مسار الكرة عند الاصطدام بالمضرب
        if (collision(ball, player)) {
            // حساب نقطة الاصطدام لتغيير الزاوية
            let collidePoint = (ball.y - (player.y + player.height / 2));
            collidePoint = collidePoint / (player.height / 2);
            let angleRad = (Math.PI / 4) * collidePoint;

            let direction = (ball.x + ball.radius < canvas.width / 2) ? 1 : -1;
            ball.velocityX = direction * ball.speed * Math.cos(angleRad);
            ball.velocityY = ball.speed * Math.sin(angleRad);
            ball.speed += 0.3; // زيادة سرعة الكرة تدريجياً لزيادة الحماس
        }

        // إعادة الكرة للمنتصف إذا تجاوزت الحواف الأفقية
        if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = 7; // إعادة السرعة لوضعها الطبيعي
            ball.velocityX = -ball.velocityX; // عكس الاتجاه
        }
    };

    // رسم اللعبة على الشاشة
    const render = () => {
        // مسح الشاشة بالكامل في كل إطار ورسم الخلفية
        drawRect(0, 0, canvas.width, canvas.height, "#111");

        // رسم المضارب والكرة
        drawRect(user.x, user.y, user.width, user.height, user.color);
        drawRect(com.x, com.y, com.width, com.height, com.color);
        drawArc(ball.x, ball.y, ball.radius, ball.color);
    };

    // حلقة اللعبة (Game Loop) 
    const gameLoop = () => {
        update();
        render();
        // هذه الدالة هي المعيار الحديث لتحديث الرسوميات بسلاسة في المتصفح
        requestAnimationFrame(gameLoop); 
    };

    // بدء اللعبة
    gameLoop();
</script>
</body>
</html>
