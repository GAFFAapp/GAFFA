<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAFFA - Professional Edition</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --text-gray: #777; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* الهوية البصرية */
        .profile-container { padding: 35px 20px 10px; display: flex; align-items: center; gap: 20px; }
        .profile-pic { 
            width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--gold); 
            padding: 3px; box-shadow: 0 0 15px var(--gold); animation: pulse 2.5s infinite; cursor: pointer;
        }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 10px var(--gold); } 50% { box-shadow: 0 0 25px var(--gold); } }
        .profile-pic img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #222; }
        
        .stats-container { display: flex; flex-grow: 1; justify-content: space-around; text-align: center; }
        .stat-value { font-weight: 800; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; color: var(--text-gray); }

        .bio-section { padding: 0 25px 15px; }
        .profile-name { font-weight: bold; font-size: 22px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }

        .btn-group-elite { display: flex; gap: 8px; padding: 0 20px 15px; }
        .elite-btn { 
            flex: 1; padding: 10px; border: 1px solid #333; background: var(--card); 
            border-radius: 12px; color: white; font-size: 12px; font-weight: 600; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.3s;
        }
        .btn-follow { background: var(--gold); color: black; border: none; flex: 1.5; }

        /* الهايلايتس */
        .highlights-container { display: flex; gap: 15px; padding: 0 20px 20px; overflow-x: auto; scrollbar-width: none; }
        .highlight-item { flex: 0 0 auto; width: 65px; text-align: center; cursor: pointer; }
        .highlight-circle { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #333; display: flex; align-items: center; justify-content: center; background: #0a0a0a; overflow: hidden; margin-bottom: 5px;}
        .highlight-circle img { width: 100%; height: 100%; object-fit: cover; }
        .highlight-circle.add-story { border: 1.5px dashed var(--gold); color: var(--gold); }
        .highlight-name { font-size: 10px; color: var(--text-gray); }

        /* التبويبات */
        .post-tabs { display: flex; border-top: 1px solid #222; margin-top: 10px; background: #050505; }
        .tab-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #555; transition: 0.3s; border-bottom: 2px solid transparent; }
        .tab-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* الشبكة */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; padding-bottom: 90px; }
        .grid-item { aspect-ratio: 1/1; background: #0a0a0a; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* البار السفلي */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 2000; }
        .nav-item { color: #888; text-decoration: none; }
        .publish-btn { background: var(--gold); width: 50px; height: 50px; border-radius: 16px; box-shadow: 0 0 20px var(--gold); transform: translateY(-12px); display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* المودالات */
        .modal { display: none; position: fixed; z-index: 3000; inset: 0; background: rgba(0,0,0,0.9); }
        .modal-content { background: #111; margin: 25% auto; padding: 25px; border-radius: 20px; width: 85%; border: 1px solid var(--gold); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="profile-pic" onclick="document.getElementById('profileFile').click()">
        <img id="mainAvatar" src="https://via.placeholder.com/150">
        <input type="file" id="profileFile" hidden onchange="updateProfilePic(this)">
    </div>
    <div class="stats-container">
        <div><span id="postCount" class="stat-value">0</span><span class="stat-label">منشور</span></div>
        <div><span id="followerCount" class="stat-value">850</span><span class="stat-label">متابع</span></div>
        <div><span class="stat-value">120</span><span class="stat-label">أتابع</span></div>
    </div>
</div>

<div class="bio-section">
    <div class="profile-name" id="nameDisplay">GAFFA ISMAIL <i data-lucide="badge-check" style="fill:#1d9bf0; color:#1d9bf0; width:20px;"></i></div>
    <div id="bioDisplay" style="font-size: 13px; color: #aaa;">مبتكر نظام الذهب السائل 💎</div>
</div>

<div class="btn-group-elite">
    <button id="followBtn" class="elite-btn btn-follow" onclick="toggleFollow()"><i data-lucide="user-plus"></i> متابعة</button>
    <a href="messages.html" class="elite-btn"><i data-lucide="mail"></i> مراسلة</a>
    <button class="elite-btn" onclick="openModal('editModal')"><i data-lucide="settings"></i> تعديل</button>
</div>

<div class="highlights-container" id="storyList">
    <div class="highlight-item" onclick="openModal('storyModal')">
        <div class="highlight-circle add-story"><i data-lucide="plus"></i></div>
        <div class="highlight-name">جديد</div>
    </div>
    </div>

<div class="post-tabs">
    <div class="tab-item active" onclick="switchTab(this, 'grid')"><i data-lucide="grid"></i></div>
    <div class="tab-item" onclick="switchTab(this, 'reels')"><i data-lucide="clapperboard"></i></div>
</div>

<div class="photo-grid" id="mainGrid"></div>

<div class="nav-bottom">
    <a href="feed.html" class="nav-item"><i data-lucide="home"></i></a>
    <a href="explore.html" class="nav-item"><i data-lucide="search"></i></a>
    <div class="publish-btn" onclick="openModal('pubModal')"><i data-lucide="plus" style="color:black"></i></div>
    <a href="messages.html" class="nav-item"><i data-lucide="message-square"></i></a>
    <a href="profile.html" class="nav-item" style="color:var(--gold)"><i data-lucide="user"></i></a>
</div>

<div id="pubModal" class="modal"><div class="modal-content"><h3 style="color:var(--gold); text-align:center;">نشر منشور 📸</h3><input type="file" id="postImgInp" accept="image/*"><button onclick="publish()" style="width:100%; background:var(--gold); padding:12px; border:none; border-radius:10px; font-weight:bold;">نشر</button><button onclick="closeModal('pubModal')" style="width:100%; background:none; color:white; border:none; margin-top:10px;">إلغاء</button></div></div>
<div id="editModal" class="modal"><div class="modal-content"><h3 style="color:var(--gold); text-align:center;">تعديل الملف</h3><input type="text" id="newName" placeholder="الاسم"><textarea id="newBio" placeholder="السيرة"></textarea><button onclick="saveProfile()" style="width:100%; background:var(--gold); padding:12px; border:none; border-radius:10px; font-weight:bold;">حفظ</button><button onclick="closeModal('editModal')" style="width:100%; background:none; color:white; border:none; margin-top:10px;">إلغاء</button></div></div>
<div id="storyModal" class="modal"><div class="modal-content"><h3 style="color:var(--gold); text-align:center;">إضافة هايلايت</h3><input type="file" id="sImg" accept="image/*"><input type="text" id="sTitle" placeholder="العنوان"><button onclick="addStory()" style="width:100%; background:var(--gold); padding:12px; border:none; border-radius:10px; font-weight:bold;">إضافة</button><button onclick="closeModal('storyModal')" style="width:100%; background:none; color:white; border:none; margin-top:10px;">إلغاء</button></div></div>

<script>
    lucide.createIcons();

    // دالات فتح المودالات
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // 1. إدارة المتابعة والحفظ
    let followers = parseInt(localStorage.getItem('foll')) || 850;
    document.getElementById('followerCount').innerText = followers;
    function toggleFollow() {
        const btn = document.getElementById('followBtn');
        if(btn.innerText.includes("متابعة")) {
            followers++; btn.innerHTML = '<i data-lucide="user-check"></i> تم المتابعة'; btn.style.background = "#222"; btn.style.color = "white";
        } else {
            followers--; btn.innerHTML = '<i data-lucide="user-plus"></i> متابعة'; btn.style.background = "var(--gold)"; btn.style.color = "black";
        }
        document.getElementById('followerCount').innerText = followers;
        localStorage.setItem('foll', followers); lucide.createIcons();
    }

    // 2. إدارة الملف الشخصي (نفس كودك السابق مع التأكيد على الحفظ)
    if(localStorage.getItem('name')) document.getElementById('nameDisplay').innerHTML = localStorage.getItem('name') + ' <i data-lucide="badge-check" style="fill:#1d9bf0; color:#1d9bf0; width:20px;"></i>';
    if(localStorage.getItem('bio')) document.getElementById('bioDisplay').innerText = localStorage.getItem('bio');
    if(localStorage.getItem('avatar')) document.getElementById('mainAvatar').src = localStorage.getItem('avatar');

    function saveProfile() {
        const n = document.getElementById('newName').value;
        const b = document.getElementById('newBio').value;
        if(n) { document.getElementById('nameDisplay').innerHTML = n + ' <i data-lucide="badge-check" style="fill:#1d9bf0; color:#1d9bf0; width:20px;"></i>'; localStorage.setItem('name', n); }
        if(b) { document.getElementById('bioDisplay').innerText = b; localStorage.setItem('bio', b); }
        closeModal('editModal'); lucide.createIcons();
    }

    function updateProfilePic(inp) {
        if(inp.files[0]) {
            const r = new FileReader();
            r.onload = e => { document.getElementById('mainAvatar').src = e.target.result; localStorage.setItem('avatar', e.target.result); };
            r.readAsDataURL(inp.files[0]);
        }
    }

    // 3. إدارة التبويبات (الجزء الذي كان مفقوداً)
    function switchTab(el, type) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        // هنا يمكنك إضافة منطق إخفاء/إظهار فيديوهات الريلز لاحقاً
    }

    // 4. إدارة الهايلايتس والمنشورات بالذاكرة
    let posts = JSON.parse(localStorage.getItem('myPosts')) || [];
    let stories = JSON.parse(localStorage.getItem('myStories')) || [];

    function renderContent() {
        const grid = document.getElementById('mainGrid'); grid.innerHTML = "";
        posts.forEach(src => { grid.insertAdjacentHTML('afterbegin', `<div class="grid-item"><img src="${src}"></div>`); });
        document.getElementById('postCount').innerText = posts.length;

        const sList = document.getElementById('storyList');
        // نحذف الهايلايتس القديمة باستثناء زر "جديد"
        Array.from(sList.children).forEach((child, index) => { if(index > 0) child.remove(); });
        stories.forEach(s => {
            sList.insertAdjacentHTML('beforeend', `<div class="highlight-item"><div class="highlight-circle"><img src="${s.img}"></div><div class="highlight-name">${s.title}</div></div>`);
        });
    }
    renderContent();

    function publish() {
        const f = document.getElementById('postImgInp').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = e => { posts.push(e.target.result); localStorage.setItem('myPosts', JSON.stringify(posts)); renderContent(); closeModal('pubModal'); };
            r.readAsDataURL(f);
        }
    }

    function addStory() {
        const t = document.getElementById('sTitle').value;
        const f = document.getElementById('sImg').files[0];
        if(t && f) {
            const r = new FileReader();
            r.onload = e => { stories.push({title: t, img: e.target.result}); localStorage.setItem('myStories', JSON.stringify(stories)); renderContent(); closeModal('storyModal'); };
            r.readAsDataURL(f);
        }
    }
</script>
</body>
</html>
