<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAFFA - Full Memory Edition</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --text-gray: #777; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* الهوية البصرية */
        .profile-container { padding: 35px 20px 10px; display: flex; align-items: center; gap: 20px; }
        .profile-pic { 
            width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--gold); 
            padding: 3px; box-shadow: 0 0 15px var(--gold); animation: pulse 2.5s infinite; cursor: pointer;
            position: relative;
        }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 10px var(--gold); } 50% { box-shadow: 0 0 25px var(--gold); } }
        .profile-pic img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #222; }
        
        .stats-container { display: flex; flex-grow: 1; justify-content: space-around; text-align: center; }
        .stat-value { font-weight: 800; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; color: var(--text-gray); }

        .bio-section { padding: 0 25px 15px; }
        .profile-name { font-weight: bold; font-size: 22px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }

        /* الأزرار */
        .btn-group-elite { display: flex; gap: 8px; padding: 0 20px 15px; }
        .elite-btn { 
            flex: 1; padding: 10px; border: 1px solid #333; background: var(--card); 
            border-radius: 12px; color: white; font-size: 12px; font-weight: 600; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-follow { background: var(--gold); color: black; border: none; flex: 1.5; }

        /* الهايلايتس */
        .highlights-container { display: flex; gap: 15px; padding: 0 20px 20px; overflow-x: auto; scrollbar-width: none; }
        .highlight-item { flex: 0 0 auto; width: 65px; text-align: center; }
        .highlight-circle { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #333; display: flex; align-items: center; justify-content: center; background: #0a0a0a; overflow: hidden; margin-bottom: 5px;}
        .highlight-circle img { width: 100%; height: 100%; object-fit: cover; }
        .highlight-circle.add-btn { border: 1.5px dashed var(--gold); color: var(--gold); cursor: pointer; }
        .highlight-name { font-size: 10px; color: var(--text-gray); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* التبويبات والشبكة */
        .post-tabs { display: flex; border-top: 1px solid #222; margin-top: 10px; background: #050505; }
        .tab-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #555; }
        .tab-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; padding-bottom: 90px; }
        .grid-item { aspect-ratio: 1/1; background: #0a0a0a; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* البار السفلي */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 2000; }
        .nav-item { color: #888; text-decoration: none; }
        .publish-btn { background: var(--gold); width: 50px; height: 50px; border-radius: 16px; display: flex; align-items: center; justify-content: center; transform: translateY(-12px); cursor: pointer; }

        /* المودالات */
        .modal { display: none; position: fixed; z-index: 3000; inset: 0; background: rgba(0,0,0,0.9); }
        .modal-content { background: #111; margin: 25% auto; padding: 25px; border-radius: 20px; width: 85%; border: 1px solid var(--gold); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="profile-pic" onclick="document.getElementById('pfpInput').click()">
        <img id="pfpImg" src="https://via.placeholder.com/150">
        <input type="file" id="pfpInput" hidden accept="image/*" onchange="savePfp(this)">
    </div>
    <div class="stats-container">
        <div><span id="pCount" class="stat-value">0</span><span class="stat-label">منشور</span></div>
        <div><span id="fCount" class="stat-value">850</span><span class="stat-label">متابع</span></div>
        <div><span class="stat-value">120</span><span class="stat-label">أتابع</span></div>
    </div>
</div>

<div class="bio-section">
    <div class="profile-name" id="nameDisp">GAFFA ISMAIL <i data-lucide="badge-check" style="fill:#1d9bf0; color:#1d9bf0; width:20px;"></i></div>
    <div id="bioDisp" style="font-size: 13px; color: #aaa;">مبتكر نظام الذهب السائل 💎</div>
</div>

<div class="btn-group-elite">
    <button id="fBtn" class="elite-btn btn-follow" onclick="toggleFollow()">متابعة</button>
    <button class="elite-btn" onclick="openMod('editMod')">تعديل</button>
</div>

<div class="highlights-container" id="hList">
    <div class="highlight-item">
        <div class="highlight-circle add-btn" onclick="openMod('hMod')"><i data-lucide="plus"></i></div>
        <div class="highlight-name">جديد</div>
    </div>
    </div>

<div class="post-tabs">
    <div class="tab-item active"><i data-lucide="grid"></i></div>
    <div class="tab-item"><i data-lucide="clapperboard"></i></div>
</div>

<div class="photo-grid" id="gGrid"></div>

<div class="nav-bottom">
    <a href="#" class="nav-item"><i data-lucide="home"></i></a>
    <div class="publish-btn" onclick="openMod('pubMod')"><i data-lucide="plus" style="color:black"></i></div>
    <a href="#" class="nav-item" style="color:var(--gold)"><i data-lucide="user"></i></a>
</div>

<div id="pubMod" class="modal"><div class="modal-content"><h3>نشر صورة 📸</h3><input type="file" id="postInp" accept="image/*"><button onclick="doPost()" style="width:100%; background:var(--gold); padding:12px; border:none; border-radius:10px;">نشر</button><button onclick="closeMod('pubMod')" style="width:100%; background:none; color:white; border:none; margin-top:10px;">إلغاء</button></div></div>
<div id="hMod" class="modal"><div class="modal-content"><h3>هايلايت جديد 🦋</h3><input type="file" id="hInp" accept="image/*"><input type="text" id="hTitle" placeholder="العنوان"><button onclick="doHighlight()" style="width:100%; background:var(--gold); padding:12px; border:none; border-radius:10px;">إضافة</button><button onclick="closeMod('hMod')" style="width:100%; background:none; color:white; border:none; margin-top:10px;">إلغاء</button></div></div>
<div id="editMod" class="modal"><div class="modal-content"><h3>تعديل الملف</h3><input type="text" id="inName" placeholder="الاسم الجديد"><input type="text" id="inBio" placeholder="البايو الجديد"><button onclick="doEdit()" style="width:100%; background:var(--gold); padding:12px; border:none; border-radius:10px;">حفظ</button><button onclick="closeMod('editMod')" style="width:100%; background:none; color:white; border:none; margin-top:10px;">إلغاء</button></div></div>

<script>
    lucide.createIcons();
    function openMod(id) { document.getElementById(id).style.display = 'block'; }
    function closeMod(id) { document.getElementById(id).style.display = 'none'; }

    // --- نظام الذاكرة الشامل ---

    // 1. تحميل البيانات عند الفتح
    window.onload = () => {
        if(localStorage.getItem('gaffa_pfp')) document.getElementById('pfpImg').src = localStorage.getItem('gaffa_pfp');
        if(localStorage.getItem('gaffa_name')) document.getElementById('nameDisp').innerHTML = localStorage.getItem('gaffa_name') + ' <i data-lucide="badge-check" style="fill:#1d9bf0; color:#1d9bf0; width:20px;"></i>';
        if(localStorage.getItem('gaffa_bio')) document.getElementById('bioDisp').innerText = localStorage.getItem('gaffa_bio');
        renderPosts();
        renderHighlights();
        lucide.createIcons();
    };

    // 2. حفظ صورة البروفايل
    function savePfp(input) {
        if(input.files[0]) {
            const r = new FileReader();
            r.onload = e => {
                document.getElementById('pfpImg').src = e.target.result;
                localStorage.setItem('gaffa_pfp', e.target.result);
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    // 3. تعديل الاسم والبايو
    function doEdit() {
        const n = document.getElementById('inName').value;
        const b = document.getElementById('inBio').value;
        if(n) { localStorage.setItem('gaffa_name', n); document.getElementById('nameDisp').innerHTML = n + ' <i data-lucide="badge-check" style="fill:#1d9bf0; color:#1d9bf0; width:20px;"></i>'; }
        if(b) { localStorage.setItem('gaffa_bio', b); document.getElementById('bioDisp').innerText = b; }
        closeMod('editMod'); lucide.createIcons();
    }

    // 4. نظام المنشورات
    function renderPosts() {
        const posts = JSON.parse(localStorage.getItem('gaffa_posts') || '[]');
        const grid = document.getElementById('gGrid');
        grid.innerHTML = "";
        posts.forEach(src => {
            grid.insertAdjacentHTML('afterbegin', `<div class="grid-item"><img src="${src}"></div>`);
        });
        document.getElementById('pCount').innerText = posts.length;
    }

    function doPost() {
        const file = document.getElementById('postInp').files[0];
        if(file) {
            const r = new FileReader();
            r.onload = e => {
                const posts = JSON.parse(localStorage.getItem('gaffa_posts') || '[]');
                posts.push(e.target.result);
                localStorage.setItem('gaffa_posts', JSON.stringify(posts));
                renderPosts(); closeMod('pubMod');
            };
            r.readAsDataURL(file);
        }
    }

    // 5. نظام الهايلايت (المطلوب)
    function renderHighlights() {
        const highlights = JSON.parse(localStorage.getItem('gaffa_highlights') || '[]');
        const list = document.getElementById('hList');
        // مسح القديم مع ترك زر "جديد"
        Array.from(list.children).forEach((el, i) => { if(i > 0) el.remove(); });
        
        highlights.forEach(h => {
            const html = `<div class="highlight-item"><div class="highlight-circle"><img src="${h.img}"></div><div class="highlight-name">${h.title}</div></div>`;
            list.insertAdjacentHTML('beforeend', html);
        });
    }

    function doHighlight() {
        const title = document.getElementById('hTitle').value;
        const file = document.getElementById('hInp').files[0];
        if(title && file) {
            const r = new FileReader();
            r.onload = e => {
                const highlights = JSON.parse(localStorage.getItem('gaffa_highlights') || '[]');
                highlights.push({title: title, img: e.target.result});
                localStorage.setItem('gaffa_highlights', JSON.stringify(highlights));
                renderHighlights(); closeMod('hMod');
            };
            r.readAsDataURL(file);
        }
    }

    // 6. المتابعة
    function toggleFollow() {
        const btn = document.getElementById('fBtn');
        const count = document.getElementById('fCount');
        if(btn.innerText === "متابعة") {
            btn.innerText = "تمت المتابعة"; btn.style.background = "#222"; btn.style.color = "white";
            count.innerText = parseInt(count.innerText) + 1;
        } else {
            btn.innerText = "متابعة"; btn.style.background = "var(--gold)"; btn.style.color = "black";
            count.innerText = parseInt(count.innerText) - 1;
        }
    }
</script>
</body>
</html>
