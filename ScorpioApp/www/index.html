<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpio Battle: Pro Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;700;800&display=swap');
        
        :root {
            --p1-neon: #00f2ff;
            --p2-neon: #ff007a;
            --zone-bg: rgba(0,0,0,0.5);
            --bg-deep: #04040a;
            --bg-card: #0a0e17;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif;
        }

        body { 
            margin: 0; 
            background: var(--bg-deep); 
            overflow: hidden; 
            font-family: var(--font-main); 
            color: #fff; 
            touch-action: none; 
        }

        .bg-animate { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at 50% 50%, #15152a 0%, var(--bg-deep) 100%); 
            z-index: -1; animation: pulseBg 12s infinite alternate; 
        }
        @keyframes pulseBg { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.05); opacity: 1; } }

        #start-menu {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; 
            padding-top: 5vh; overflow-y: auto;
            backdrop-filter: blur(25px); transition: 1s cubic-bezier(0.85, 0, 0.15, 1);
            background: rgba(4, 4, 10, 0.9);
        }

        .menu-title { 
            font-size: 60px; font-weight: 100; letter-spacing: 20px; 
            background: linear-gradient(180deg, #fff 0%, #aaa 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin-bottom: 20px;
        }
        
        .settings-grid { 
            display: grid; grid-template-columns: 1fr; gap: 20px; 
            width: 85%; max-width: 450px; margin-top: 10px; 
        }
        @media (min-width: 768px) { .settings-grid { grid-template-columns: 1fr 1fr; } .wide-box { grid-column: span 2; } }

        .setting-box { 
            background: var(--bg-card); padding: 25px; 
            border-radius: 20px; border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .setting-label { 
            font-size: 9px; letter-spacing: 3px; color: #555; 
            margin-bottom: 15px; display: block; font-weight: 700;
        }
        
        input[type="text"] { 
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.05); 
            color: #fff; width: 100%; padding: 8px 0; font-size: 18px; outline: none; 
            font-family: var(--font-main); transition: 0.3s;
        }
        
        .color-picker { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; 
        }
        .color-dot { 
            width: 100%; padding-top: 100%; border-radius: 50%; 
            cursor: pointer; border: 2px solid transparent; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .color-dot.active { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 15px #fff; }

        .btn-group { margin: 50px 0; display: flex; flex-direction: column; gap: 18px; width: 85%; max-width: 350px; }
        .main-btn { 
            background: #fff; color: #000; border: none; 
            padding: 22px; border-radius: 100px; 
            font-weight: 800; letter-spacing: 3px; cursor: pointer; 
            font-size: 14px; text-transform: uppercase;
            box-shadow: 0 15px 35px rgba(255,255,255,0.1);
        }
        .main-btn.ai { 
            background: transparent; color: #fff; 
            border: 1px solid var(--border); 
        }

        #ui-layer { position: fixed; inset: 0; z-index: 10; pointer-events: none; opacity: 0; transition: 1.5s; }
        #canvas-zone { 
            position: fixed; top: 160px; bottom: 160px; left: 15px; right: 15px; 
            background: var(--zone-bg); border-radius: 25px; 
            border: 1px solid var(--border); overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }

        .control-row { position: fixed; left: 0; right: 0; padding: 0 30px; display: flex; align-items: center; justify-content: space-between; pointer-events: auto; }
        #top-row { top: 20px; height: 120px; transform: rotate(180deg); }
        #bottom-row { bottom: 20px; height: 120px; }

        /* تعديل زر السرعة للوضع العمودي */
        .speed-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 40px;
        }
        .speed-control { 
            appearance: none; 
            -webkit-appearance: none;
            width: 70px; 
            height: 2px; 
            background: var(--border); 
            outline: none; 
            transform: rotate(-90deg); 
            margin: 35px 0;
        }
        .speed-control::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: 2px solid #000;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .gamepad { display: grid; grid-template-columns: repeat(3, 50px); gap: 10px; }
        .btn { width: 50px; height: 50px; border-radius: 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); }
        .btn:active { background: rgba(255,255,255,0.1); color: #fff; border-color: #fff; }
        
        .score-card { text-align: center; }
        .player-name { font-size: 10px; letter-spacing: 2px; color: #555; text-transform: uppercase; font-weight: 700; }
        .score-num { font-size: 40px; font-weight: 100; margin: 5px 0; }
        .wins-count { font-size: 8px; color: #444; letter-spacing: 1px; }

        #win-screen { position: fixed; inset: 0; z-index: 3000; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div id="start-menu">
        <div class="menu-title">SCORPIO</div>
        <div class="settings-grid">
            <div class="setting-box">
                <span class="setting-label">PLAYER 1 IDENTITY</span>
                <input type="text" id="p1-name-in" value="GAFFA">
                <div class="color-picker" id="p1-colors"></div>
            </div>
            <div class="setting-box">
                <span class="setting-label">PLAYER 2 IDENTITY</span>
                <input type="text" id="p2-name-in" value="AMINE">
                <div class="color-picker" id="p2-colors"></div>
            </div>
            <div class="setting-box wide-box">
                <span class="setting-label">BATTLE ZONE ATMOSPHERE</span>
                <div class="color-picker" id="zone-colors"></div>
            </div>
        </div>
        <div class="btn-group">
            <button class="main-btn" onclick="startGame(false)">INITIALIZE PVP</button>
            <button class="main-btn ai" onclick="startGame(true)">VERSUS A.I</button>
        </div>
    </div>

    <div id="win-screen">
        <div style="letter-spacing: 12px; font-size: 12px; margin-bottom: 25px; color: #555;">SYSTEM OVERRIDE</div>
        <h1 id="winner-text" style="font-size: 55px; font-weight: 100; letter-spacing: 5px;"></h1>
        <button onclick="location.reload()" style="background: none; border: 1px solid #222; color: #444; padding: 12px 35px; border-radius: 50px; margin-top: 50px; cursor: pointer;">REBOOT SYSTEM</button>
    </div>

    <div id="ui-layer">
        <div class="control-row" id="top-row">
            <div class="score-card" id="p2-card-ui">
                <div class="player-name" id="p2-display-name">P2</div>
                <div class="score-num" id="p2-score">00</div>
                <div class="wins-count" id="p2-wins-display">WINS: 0</div>
            </div>
            <div class="gamepad">
                <div style="grid-column:2" class="btn" id="p2-up">↑</div>
                <div style="grid-column:1; grid-row:2" class="btn" id="p2-left">←</div>
                <div style="grid-column:3; grid-row:2" class="btn" id="p2-right">→</div>
                <div style="grid-column:2; grid-row:3" class="btn" id="p2-down">↓</div>
            </div>
            <div class="speed-wrapper">
                <span class="setting-label" style="margin:0; font-size:7px;">SPD</span>
                <input type="range" class="speed-control" min="1" max="5" step="0.5" value="2.5" oninput="p2.speed = parseFloat(this.value)">
            </div>
        </div>

        <div class="control-row" id="bottom-row">
            <div class="speed-wrapper">
                <span class="setting-label" style="margin:0; font-size:7px;">SPD</span>
                <input type="range" class="speed-control" min="1" max="5" step="0.5" value="2.5" oninput="p1.speed = parseFloat(this.value)">
            </div>
            <div class="gamepad">
                <div style="grid-column:2" class="btn" id="p1-up">↑</div>
                <div style="grid-column:1; grid-row:2" class="btn" id="p1-left">←</div>
                <div style="grid-column:3; grid-row:2" class="btn" id="p1-right">→</div>
                <div style="grid-column:2; grid-row:3" class="btn" id="p1-down">↓</div>
            </div>
            <div class="score-card" id="p1-card-ui">
                <div class="player-name" id="p1-display-name">P1</div>
                <div class="score-num" id="p1-score">00</div>
                <div class="wins-count" id="p1-wins-display">WINS: 0</div>
            </div>
        </div>
    </div>

    <div id="canvas-zone"><canvas id="canvas"></canvas></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let gameStarted = false;
        let isAiMode = false;

        const colors = [
            '#00f2ff', '#ff007a', '#00ff41', '#ffff00', '#ff0000', '#7d00ff', '#ff8a00',
            '#ffffff', '#33ffaa', '#ff33aa', '#aa33ff', '#33aaff', '#ffaa33', '#00bfff',
            '#00ced1', '#ff1493', '#adff2f', '#4b0082', '#ff4500', '#2e8b57', '#000000'
        ];

        function initPickers() {
            const createDots = (containerId, targetObj, property) => {
                const container = document.getElementById(containerId);
                colors.forEach(c => {
                    let dot = document.createElement('div');
                    dot.className = 'color-dot';
                    if(containerId === 'p1-colors' && c === '#00f2ff') dot.classList.add('active');
                    if(containerId === 'p2-colors' && c === '#ff007a') dot.classList.add('active');
                    if(containerId === 'zone-colors' && c === '#000000') dot.classList.add('active');
                    dot.style.background = c;
                    dot.onclick = () => {
                        document.querySelectorAll(`#${containerId} .color-dot`).forEach(d => d.classList.remove('active'));
                        dot.classList.add('active');
                        if(containerId === 'zone-colors') document.documentElement.style.setProperty('--zone-bg', c + '99');
                        else targetObj[property] = c;
                    };
                    container.appendChild(dot);
                });
            };
            createDots('p1-colors', p1, 'color');
            createDots('p2-colors', p2, 'color');
            createDots('zone-colors', null, null);
        }

        let wins = JSON.parse(localStorage.getItem('scorpio_wins')) || { p1: 0, p2: 0 };
        function updateWins() {
            document.getElementById('p1-wins-display').innerText = `WINS: ${wins.p1}`;
            document.getElementById('p2-wins-display').innerText = `WINS: ${wins.p2}`;
            localStorage.setItem('scorpio_wins', JSON.stringify(wins));
        }

        let p1 = { name: "GAFFA", x: 100, y: 200, segments: Array(25).fill(0).map(()=>({x:100,y:200})), dir: 'right', color: '#00f2ff', speed: 2.5, score: 0 };
        let p2 = { name: "AMINE", x: 100, y: 100, segments: Array(25).fill(0).map(()=>({x:100,y:100})), dir: 'right', color: '#ff007a', speed: 2.5, score: 0 };
        let food = { x: 200, y: 150 };

        function startGame(ai) {
            isAiMode = ai;
            p1.name = document.getElementById('p1-name-in').value;
            p2.name = ai ? "AI SYSTEM" : document.getElementById('p2-name-in').value;
            document.getElementById('p1-display-name').innerText = p1.name;
            document.getElementById('p2-display-name').innerText = p2.name;
            document.getElementById('p1-card-ui').style.color = p1.color;
            document.getElementById('p2-card-ui').style.color = p2.color;
            
            const menu = document.getElementById('start-menu');
            menu.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                document.getElementById('ui-layer').style.opacity = '1';
                gameStarted = true;
                updateWins();
                resize();
                loop();
            }, 1000);
        }

        function resize() {
            canvas.width = document.getElementById('canvas-zone').clientWidth;
            canvas.height = document.getElementById('canvas-zone').clientHeight;
        }
        window.onresize = resize;

        const bind = (id, p, d, mirror=false) => {
            document.getElementById(id).addEventListener('touchstart', (e) => {
                e.preventDefault();
                let finalDir = d;
                if(mirror) {
                    if(d==='up') finalDir='down'; else if(d==='down') finalDir='up';
                    else if(d==='left') finalDir='right'; else if(d==='right') finalDir='left';
                }
                p.dir = finalDir;
            });
        };
        bind('p1-up', p1, 'up'); bind('p1-down', p1, 'down'); bind('p1-left', p1, 'left'); bind('p1-right', p1, 'right');
        bind('p2-up', p2, 'up', true); bind('p2-down', p2, 'down', true); bind('p2-left', p2, 'left', true); bind('p2-right', p2, 'right', true);

        function loop() {
            if(!gameStarted) return;
            if(isAiMode) {
                if (Math.abs(p2.x - food.x) > 5) p2.dir = p2.x < food.x ? 'right' : 'left';
                else if (Math.abs(p2.y - food.y) > 5) p2.dir = p2.y < food.y ? 'down' : 'up';
            }
            ctx.fillStyle = 'rgba(2, 2, 5, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            [p1, p2].forEach(p => {
                if(p.dir=='up') p.y-=p.speed; if(p.dir=='down') p.y+=p.speed;
                if(p.dir=='left') p.x-=p.speed; if(p.dir=='right') p.x+=p.speed;
                if(p.x<0) p.x=canvas.width; if(p.x>canvas.width) p.x=0;
                if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0;

                p.segments.unshift({x: p.x, y: p.y});
                if(Math.hypot(p.x - food.x, p.y - food.y) < 20) {
                    p.score += 20;
                    food = { x: Math.random()*(canvas.width-60)+30, y: Math.random()*(canvas.height-60)+30 };
                    for(let j=0; j<8; j++) p.segments.push({...p.segments[p.segments.length-1]});
                    if(p.score >= 500) {
                        gameStarted = false;
                        if(p === p1) wins.p1++; else wins.p2++;
                        localStorage.setItem('scorpio_wins', JSON.stringify(wins));
                        document.getElementById('win-screen').style.display = 'flex';
                        document.getElementById('winner-text').innerText = `${p.name} DOMINANT`;
                        document.getElementById('winner-text').style.color = p.color;
                    }
                }
                p.segments.pop();

                p.segments.forEach((s, i) => {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = 1 - (i / p.segments.length);
                    ctx.beginPath(); ctx.arc(s.x, s.y, 8 - (i / p.segments.length) * 5, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1;
            });

            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(food.x, food.y, 8, 0, Math.PI*2); ctx.fill(); 
            document.getElementById('p1-score').innerText = p1.score.toString().padStart(2, '0');
            document.getElementById('p2-score').innerText = p2.score.toString().padStart(2, '0');
            requestAnimationFrame(loop);
        }
        initPickers();
    </script>
</body>
</html>
