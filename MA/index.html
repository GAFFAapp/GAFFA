<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Diamonds | متجر النخبة لشحن الجواهر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f9d976;
            --dark-deep: #050505;
            --dark-card: #121212;
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        body {
            background-color: var(--dark-deep);
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تأثير الخلفية المتوهجة */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--gold-primary);
            filter: blur(150px);
            opacity: 0.1;
            top: -50px;
            right: -50px;
            z-index: -1;
        }

        .main-container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        header h1 {
            font-weight: 900;
            font-size: 2.5rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--gold-primary), var(--gold-light), var(--gold-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        header p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .diamond-card {
            background: var(--dark-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        /* خط ذهبي علوي للجمالية */
        .diamond-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold-light);
            font-size: 0.85rem;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        .btn-premium {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transition: 0.3s;
        }

        .btn-premium:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4);
        }

        .footer-note {
            margin-top: 20px;
            color: #555;
            font-size: 0.75rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>ELITE DIAMONDS</h1>
            <p>خدمة الشحن الفوري الأكثر أماناً وفخامة</p>
        </header>

        <div class="diamond-card">
            <form action="/order" method="POST">
                <div class="input-group">
                    <label>معرف اللاعب (PLAYER ID)</label>
                    <input type="text" name="player_id" placeholder="مثال: 123456789" required>
                </div>

                <div class="input-group">
                    <label>اختر باقة الجواهر</label>
                    <select name="package">
                        <option value="110">110 جوهرة - عرض خاص</option>
                        <option value="530">530 جوهرة - باقة المغامر</option>
                        <option value="1080">1080 جوهرة - باقة النخبة</option>
                        <option value="2200">2200 جوهرة - باقة الأساطير</option>
                    </select>
                </div>

                <button type="submit" class="btn-premium">تأكيد الشحن الآمن</button>
            </form>
        </div>

        <div class="footer-note">
            &copy; 2026 Elite Shop. All Rights Reserved.
            <br>
            نظام تشفير معتمد لحماية بيانات الحسابات.
        </div>
    </div>

</body>
</html>
