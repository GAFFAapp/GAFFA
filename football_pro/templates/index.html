<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
   <style>
    /* جعل الصفحة تأخذ كامل طول الشاشة وتوسيط المحتوى */
    body { 
        background: #050505; 
        color: #00f2ff; 
        font-family: 'Courier New', monospace; 
        margin: 0;
        display: flex;
        justify-content: center; /* توسيط أفقي */
        align-items: center;     /* توسيط عمودي */
        min-height: 100vh;       /* شغل كامل ارتفاع شاشة الهاتف */
    }

    /* تحسين شكل البطاقة لتكون متجاوبة */
    .card { 
        background: #111; 
        border: 2px solid #00f2ff; 
        border-radius: 15px; 
        padding: 25px; 
        width: 90%;             /* تأخذ 90% من عرض شاشة الهاتف */
        max-width: 400px;        /* لا تتجاوز 400 بكسل */
        box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
        text-align: center;
    }

    h1 { font-size: 1.4em; margin-bottom: 20px; text-shadow: 0 0 10px #00f2ff; }

    input { 
        background: #1a1a1a; 
        border: 1px solid #333; 
        color: #fff; 
        padding: 12px; 
        border-radius: 8px; 
        margin: 10px 0; 
        width: 100%;             /* جعل الحقول بعرض البطاقة */
        box-sizing: border-box;  /* لضمان عدم خروج الحقل عن الإطار */
    }

    .neon-btn { 
        background: #00f2ff; 
        color: #000; 
        font-weight: bold; 
        padding: 15px; 
        border: none; 
        border-radius: 8px;
        width: 100%;
        cursor: pointer; 
        margin-top: 15px;
        transition: 0.3s ease;
    }

    .neon-btn:hover { box-shadow: 0 0 20px #00f2ff; transform: scale(1.02); }

    .result-section {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px dashed #333;
    }
</style>

</head>
<body>
    <div class="card">
        <h1>FOOTBALL ANALYZER PRO ⚽</h1>
        <form method="POST">
           <input type="text" name="team1_name" placeholder="اسم الفريق الأول (مثلاً: Real Madrid)" required>
           <input type="text" name="team2_name" placeholder="اسم الفريق الثاني (مثلاً: Barcelona)" required>
            <br><br>
            <button type="submit" class="neon-btn">توليد التوقعات الذكية</button>
        </form>

        {% if result %}
        <div style="margin-top:30px; border-top: 1px solid #333; padding-top:20px;">
            <h3>النتيجة الأكثر توقعاً: <span style="font-size: 1.5em;">{{ result.score }}</span></h3>
            <p>نسبة الثقة: {{ result.prob }}%</p>
            <div style="font-size: 0.8em; color: #555;">بناءً على توزيع بواسون الرياضي</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
